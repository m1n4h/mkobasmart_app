name: mkobasmart_app
description: A smart financial management platform for Tanzanians
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # UI & Animations
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  fl_chart: ^0.65.0
  animated_bottom_navigation_bar: ^1.3.0
  shimmer: ^3.0.0
  page_transition: ^2.0.9
  
  # State Management
  provider: ^6.1.1
  
  # Storage & Auth
  shared_preferences: ^2.2.2
  google_sign_in: ^6.1.5
  
  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Network & API
  http: ^1.1.0
  graphql_flutter: ^5.1.2
  
  # Utilities
  image_picker: ^1.0.5
  intl_phone_number_input: ^0.7.3
  url_launcher: ^6.2.1
  
  # Image
  image: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700